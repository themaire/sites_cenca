<div class="site-parent">
  <!-- Sert a afficher le titre dans la bande orange verticale -->
  <div class="proteger"></div>
  <p>Protéger</p>
  <div class="table-container">
    <div class="table-header">
      <div class="add-pmfu">
        <button
          mat-icon-button
          matTooltip="Ajouter un projet MFU"
          class="btn-edition"
          (click)="onSelect()"
        >
          <mat-icon>add</mat-icon>
        </button>
        <p>Ajouter un Projet MFU</p>
      </div>
      <div class="filtres">
        <mat-form-field class="filtre-select" *ngFor="let selector of selectors">
          <mat-label>{{ selector.title }}</mat-label>
          <mat-select
            [value]="selectorFilters[selector.name] || ''"
            (selectionChange)="onSelectorChange(selector.name, $event.value)">
            <mat-option value="">Tous</mat-option>
            <mat-option *ngFor="let value of selector.values" [value]="value">
              {{ value }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field class="filtre">
          <mat-label>Mots-clés</mat-label>
          <input matInput (keyup)="applyFilter($event)" placeholder="" #input />
        </mat-form-field>

        <button
          mat-icon-button
          *ngIf="hasActiveFilters"
          matTooltip="Réinitialiser les filtres"
          class="btn-reset-filtres"
          (click)="resetFilters(input)">
          <mat-icon>filter_alt_off</mat-icon>
        </button>

        <div class="aide-button">
          <a
            mat-button
            class="btn-aide"
            routerLink="/aide/projets-mfu"
            target="_blank"
            [ngStyle]="{ 'border-radius': '20px' }"
          >
            <mat-icon>help</mat-icon>
            Aide
          </a>
        </div>
      </div>
    </div>
    <div class="table">
      <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">
        <ng-container matColumnDef="pmfu_nom">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>
            Nom du Projet
          </th>
          <td mat-cell *matCellDef="let element">
            <span
              [innerHTML]="element.pmfu_nom | highlight : filterValue"
            ></span>
          </td>
        </ng-container>

        <ng-container matColumnDef="pmfu_responsable">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>
            Nom du responsable
          </th>
          <td mat-cell *matCellDef="let element">
            <span
              [innerHTML]="element.pmfu_responsable | highlight : filterValue"
            ></span>
          </td>
        </ng-container>
        <ng-container matColumnDef="pmfu_commune_nom">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Commune(s)</th>
          <td mat-cell *matCellDef="let element">
            <span
              [innerHTML]="pmfuCommunesLibelle(element) | highlight : filterValue"
            ></span>
          </td>
        </ng-container>
        <ng-container matColumnDef="type_acte">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Type d'acte</th>
          <td mat-cell *matCellDef="let element">
            <span
              [innerHTML]="element.type_acte | highlight : filterValue"
            ></span>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr
          mat-row
          *matRowDef="let row; columns: displayedColumns"
          matTooltip="{{ 'Ouvrir le projet ' + row.pmfu_nom}}"
          (click)="onSelect(row)"
          class="mat-row"
        ></tr>
        <tr class="mat-row" *matNoDataRow>
          <td>
            Pas de donnée correspondante à vos filtres<ng-container *ngIf="input.value">
              (mot clé : "{{ input.value }}")</ng-container>.
          </td>
        </tr>
      </table>

      <mat-paginator
        [pageSize]="20"
        [pageSizeOptions]="[5, 10, 20]"
        showFirstLastButtons
        aria-label="Tableau de selection des sites issue de la recherche."
        class="paginator">
      </mat-paginator>
    </div>
  </div>
</div>
