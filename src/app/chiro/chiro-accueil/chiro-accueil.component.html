<div class="chiro-accueil">
  <h1 class="titre">Chiroptères</h1>

  <div class="blocs">
    <mat-card class="bloc">
      <mat-card-header>
        <mat-card-title>Consulter</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="boutons">
          <button mat-raised-button color="primary" (click)="consulterReleves()">
            <mat-icon>search</mat-icon> Relevés
          </button>
          <button mat-raised-button color="primary" (click)="consulterSites()">
            <mat-icon>place</mat-icon> Sites
          </button>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="bloc">
      <mat-card-header>
        <mat-card-title>Saisir</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="boutons">
          <button mat-raised-button color="accent" (click)="nouveauReleve()">
            <mat-icon>add</mat-icon> Nouveau relevé
          </button>
          <button mat-raised-button color="accent" (click)="nouveauSite()">
            <mat-icon>add_location</mat-icon> Nouveau site
          </button>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
