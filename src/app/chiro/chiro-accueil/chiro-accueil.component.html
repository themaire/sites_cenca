<div class="chiro-accueil">
  <h1 class="titre">Chiroptères <span class="version">Phase 1</span></h1>

  <div class="blocs">
    <mat-card class="bloc">
      <mat-card-header>
        <mat-card-title>Consulter</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="boutons">
          <button mat-raised-button color="primary" (click)="consulterReleves()">
            <mat-icon>search</mat-icon> Relevés
          </button>
          <button mat-raised-button color="primary" (click)="consulterSites()">
            <mat-icon>place</mat-icon> Sites
          </button>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="bloc disabled">
      <mat-card-header>
        <mat-card-title>Saisir</mat-card-title>
        <mat-card-subtitle>Disponible en Phase 2</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <div class="boutons">
          <button mat-raised-button disabled>Nouveau relevé</button>
          <button mat-raised-button disabled>Nouveau site</button>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
