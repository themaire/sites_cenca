<div class="liste-releves">
  <div class="entete">
    <h2>Liste des relevés</h2>
    <button mat-stroked-button (click)="retour()">
      <mat-icon>arrow_back</mat-icon> Retour
    </button>
  </div>

  <!-- Filtres -->
  <div class="filtres">
    <mat-form-field appearance="outline">
      <mat-label>Commune</mat-label>
      <mat-select [(ngModel)]="filtreCommune" (ngModelChange)="chargerReleves()">
        <mat-option [value]="null">Toutes</mat-option>
        <mat-option *ngFor="let c of communes" [value]="c.insee">{{ c.nom }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Espèce</mat-label>
      <mat-select [(ngModel)]="filtreEspece" (ngModelChange)="chargerReleves()">
        <mat-option [value]="null">Toutes</mat-option>
        <mat-option *ngFor="let e of especes" [value]="e.cd_espece">{{ e.nom }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Année</mat-label>
      <input matInput [(ngModel)]="filtreAnnee" placeholder="2024" (change)="chargerReleves()" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Filtre texte</mat-label>
      <input matInput (keyup)="applyTextFilter($event)" placeholder="Commune, site..." />
    </mat-form-field>
  </div>

  <div *ngIf="loading" class="spinner-wrapper">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z4" [hidden]="loading">
    <ng-container matColumnDef="commune">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Commune</th>
      <td mat-cell *matCellDef="let r">{{ r.commune }}</td>
    </ng-container>

    <ng-container matColumnDef="nom_site">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Site</th>
      <td mat-cell *matCellDef="let r">{{ r.nom_site || r.site }}</td>
    </ng-container>

    <ng-container matColumnDef="date_releve">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
      <td mat-cell *matCellDef="let r">{{ r.date_releve | date:'dd/MM/yyyy' }}</td>
    </ng-container>

    <ng-container matColumnDef="orga">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Opérateur(s)</th>
      <td mat-cell *matCellDef="let r">{{ r.orga }}</td>
    </ng-container>

    <ng-container matColumnDef="nbesp">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Nb espèces</th>
      <td mat-cell *matCellDef="let r" class="num">{{ r.nbesp }}</td>
    </ng-container>

    <ng-container matColumnDef="nbobs">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Nb individus</th>
      <td mat-cell *matCellDef="let r" class="num">{{ r.nbobs }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns" (click)="onRowClick(row)" class="clickable"></tr>

    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="6">Aucun relevé trouvé.</td>
    </tr>
  </table>

  <mat-paginator [pageSize]="25" [pageSizeOptions]="[10, 25, 50, 100]" showFirstLastButtons></mat-paginator>
</div>
