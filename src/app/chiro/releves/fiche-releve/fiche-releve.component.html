<div class="fiche-releve">
  <div class="entete">
    <button mat-stroked-button (click)="retour()">
      <mat-icon>arrow_back</mat-icon> Retour à la liste
    </button>
    <h2 *ngIf="releve">
      Relevé du {{ releve.date_releve | date:'dd/MM/yyyy' }}
      <span *ngIf="releve.nom_site"> — {{ releve.nom_site }}</span>
    </h2>
    <div class="actions-entete" *ngIf="!loading && !erreur && releve">
      <button mat-stroked-button (click)="toggleEdit()" [color]="isEditMode ? '' : 'primary'">
        <mat-icon>{{ isEditMode ? 'close' : 'edit' }}</mat-icon>
        {{ isEditMode ? 'Annuler édition' : 'Modifier' }}
      </button>
      <button mat-stroked-button color="warn" (click)="supprimerReleve()">
        <mat-icon>delete</mat-icon> Supprimer
      </button>
    </div>
  </div>

  <div *ngIf="loading" class="spinner-wrapper">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="erreur" class="erreur">
    <mat-icon>error_outline</mat-icon>
    {{ erreur }}
  </div>

  <mat-tab-group *ngIf="!loading && !erreur && releve" animationDuration="200ms">
    <mat-tab label="Relevé">
      <app-onglet-releve
        [releve]="releve"
        [isEditMode]="isEditMode"
        [typologies]="typologies"
        (saved)="onReleveSaved()"
        (cancelled)="toggleEdit()">
      </app-onglet-releve>
    </mat-tab>
    <mat-tab [label]="'Observations (' + observations.length + ')'">
      <app-onglet-observations
        [observations]="observations"
        [uuidReleve]="uuid!"
        [typologies]="typologies"
        (changed)="onObservationsChanged()">
      </app-onglet-observations>
    </mat-tab>
  </mat-tab-group>
</div>
