<div mat-dialog-container>
  <div>
    <h2 mat-dialog-title>
        {{ newGroup ? 'Nouveau groupe' : 'Groupe ' + group?.gro_id + ' – ' + group?.gro_nom }}
    </h2>
    <app-form-buttons
      *ngIf="!loading && !error"
      icone="edit"
      theme="preferences"
      [isFormValid]="isFormValid"
      [isEditActive]="isEditActive"
      [isAddActive]="isAddActive"
      [nbObjectifs]="-1"
      (toggleAction)="toggleEdit()"
      (onSubmit)="onSubmit()">
    </app-form-buttons>
    <div class="suppression">
      <button mat-button (click)="deleteItemConfirm()">Supprimer</button>
    </div>
  </div>

  <div mat-dialog-content>
    <div *ngIf="loading">Chargement...</div>
    <div *ngIf="error" class="error">{{ error }}</div>

    <ng-container *ngIf="!loading && !error && (group || newGroup)">

      <form [formGroup]="groupForm">

        <mat-form-field *ngIf="!newGroup" appearance="outline" style="width: 100%; margin-top: 8px;">
          <mat-label>ID du groupe</mat-label>
          <input matInput formControlName="gro_id" type="number">
          <mat-error *ngIf="groupForm.get('gro_id')?.hasError('required')">
            L'ID est obligatoire
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" style="width: 100%; margin-top: 8px;">
          <mat-label>Nom du groupe</mat-label>
          <input matInput formControlName="gro_nom">
        </mat-form-field>
        
        <mat-form-field appearance="outline" style="width: 100%; margin-top: 8px;">
          <mat-label>Description</mat-label>
          <textarea matInput formControlName="gro_description" rows="3"></textarea>
        </mat-form-field>

        <mat-checkbox formControlName="gro_statut" style="margin-top: 16px;">
          Actif
        </mat-checkbox>
      </form>
    </ng-container>
  </div>
</div>
